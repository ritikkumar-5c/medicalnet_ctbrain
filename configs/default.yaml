# MedicalNet CT-brain classifier — default config.
# Override any field on the CLI, e.g.:  python src/train.py --config configs/default.yaml --epochs 60

data:
  manifest: data/manifest.csv
  # Fast path: set to a ctcache cache_manifest.csv to read pre-built uint8 volumes
  # (already resized+windowed) instead of decoding DICOM every epoch. null = decode DICOM.
  # Build one with: python -m ctcache.build_cache --splits-dir <splits> --out-root <dir>
  #                 --size 96 384 384 --windows brain
  cache_manifest: null
  min_slices: 10
  spatial_size: [96, 384, 384]   # (D, H, W) every volume is resized to this
  windows: ["brain"]             # 1 name -> 1 channel; add "subdural","bone" for multi-channel

model:
  depth: 34                      # MedicalNet resnet depth: 10/18/34/50
  num_classes: 3
  dropout: 0.3
  pretrained: true
  pretrained_path: null          # set to a .pth to skip auto-download

train:
  epochs: 60
  batch_size: 4
  num_workers: 8
  lr: 0.0003
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine              # cosine | plateau | none
  warmup_epochs: 3
  amp: true                      # mixed precision (CUDA)
  grad_clip: 1.0
  freeze_backbone_epochs: 3      # train head only for the first N epochs, then unfreeze
  class_weighting: balanced      # balanced | none — class weights for the loss
  sampler: weighted              # weighted | none — oversample rare classes
  label_smoothing: 0.05
  # loss: weighted_ce | focal | cost_sensitive. cost_sensitive penalizes under-calling
  # pathology to 'normal' (clinical "don't miss" priority).
  loss: weighted_ce
  focal_gamma: 2.0
  cost_miss_abnormal: 5.0        # cost of true abnormal -> predicted normal (worst miss)
  cost_miss_near_normal: 3.0     # cost of true near_normal -> predicted normal
  cost_ce_lambda: 0.3            # blended CE weight (stability) for cost_sensitive
  early_stop_patience: 12        # stop if monitor hasn't improved in N epochs
  # checkpoint/early-stop metric (higher=better). balanced_acc (mean per-class recall)
  # is preferred for "don't miss pathology": rewards recall on all classes, not gameable
  # by over-calling. options: balanced_acc | macro_f1 | not_normal_sensitivity | accuracy | macro_auc
  monitor: balanced_acc
  target_sensitivity: 0.95       # not-normal sensitivity floor for the eval operating point
  resume: null                   # path to a checkpoint to resume full training state from
  seed: 42

output:
  dir: runs/medicalnet_r34
